name: Generador de APK

on:
  push:
    branches: [ "main" ] # Cambia "main" por el nombre de tu rama si es distinta
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Si tu proyecto viene comprimido, este paso lo extrae. 
      # Si ya subiste el código suelto, este paso simplemente no hará nada o puedes quitarlo.
      - name: Descomprimir proyecto (si existe zip)
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip
          fi

      - name: Dar permisos de ejecución a Gradle
        run: find . -name "gradlew" -exec chmod +x {} +

      - name: Build Debug APK
        run: |
          # Buscamos dónde quedó el archivo gradlew (por si está en una subcarpeta)
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: No se encontró el archivo gradlew. Asegúrate de que tu proyecto Android esté en el repositorio."
            exit 1
          fi
          
          # Obtenemos la carpeta que contiene el proyecto
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          echo "Proyecto encontrado en: $PROJECT_ROOT"
          
          # Entramos a la carpeta y ejecutamos la construcción
          cd "$PROJECT_ROOT"
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
