name: WebForge Build Engine
on:
  repository_dispatch:
    types: [build_app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Limpiar y Descargar
        uses: actions/checkout@v4

      - name: 2. Crear Proyecto Blindado (Sin AndroidX)
        run: |
          # Eliminar rastro de intentos anteriores
          rm -rf app build.gradle settings.gradle
          mkdir -p app/src/main/res/values/
          mkdir -p app/src/main/java/com/webforge/app/
          mkdir -p app/src/main/assets/

          # 1. Configuración de archivos de Gradle
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. El motor de la App (Sin dependencias pesadas)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.webforge.app'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_id }}'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          # 3. Interfaz de la App (MainActivity)
          cat <<EOF > app/src/main/java/com/webforge/app/MainActivity.java
          package com.webforge.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  setContentView(webView);

                  try {
                      String[] assets = getAssets().list("");
                      boolean hasUrl = false;
                      for(String s : assets) { if(s.equals("url.txt")) hasUrl = true; }

                      if (hasUrl) {
                          BufferedReader br = new BufferedReader(new InputStreamReader(getAssets().open("url.txt")));
                          webView.loadUrl(br.readLine());
                      } else {
                          webView.loadUrl("file:///android_asset/index.html");
                      }
                  } catch (Exception e) {
                      webView.loadUrl("file:///android_asset/index.html");
                  }
              }
          }
          EOF

          # 4. Manifiesto y Recursos
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application 
                  android:label="@string/app_name" 
                  android:theme="@android:style/Theme.NoTitleBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<resources><string name="app_name">${{ github.event.client_payload.app_name }}</string></resources>' > app/src/main/res/values/strings.xml

          # 5. Inyectar tu HTML o URL
          if [ "${{ github.event.client_payload.source_type }}" == "url" ]; then
            echo "${{ github.event.client_payload.content }}" > app/src/main/assets/url.txt
          else
            echo "${{ github.event.client_payload.content }}" | base64 -d > app/src/main/assets/index.html
          fi

      - name: 3. Instalar JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Compilar APK (Modo Ultra-Rápido)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 5. Generar Archivo
        run: gradle assembleDebug

      - name: 6. Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Instalador
          path: app/build/outputs/apk/debug/app-debug.apk
