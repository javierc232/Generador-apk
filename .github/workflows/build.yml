name: WebForge Build Engine V4
on:
  repository_dispatch:
    types: [build_app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Limpiar y Descargar
        uses: actions/checkout@v4

      - name: 2. Crear Proyecto Blindado
        run: |
          rm -rf app build.gradle settings.gradle
          mkdir -p app/src/main/res/values/
          mkdir -p app/src/main/res/mipmap-xhdpi/
          mkdir -p app/src/main/java/com/webforge/app/
          mkdir -p app/src/main/assets/
          mkdir -p input_assets/

          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.webforge.app'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_id }}'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          if [ -f "input_assets/icon.png" ]; then
            cp input_assets/icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          else
            curl -L https://cdn-icons-png.flaticon.com/512/518/518713.png -o app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

          cat <<EOF > app/src/main/java/com/webforge/app/MainActivity.java
          package com.webforge.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;

          public class MainActivity extends Activity {
              private ValueCallback<Uri[]> mUploadMessage;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  WebSettings s = wv.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  wv.setWebChromeClient(new WebChromeClient() {
                      public boolean onShowFileChooser(WebView w, ValueCallback<Uri[]> f, FileChooserParams p) {
                          mUploadMessage = f;
                          Intent i = new Intent(Intent.ACTION_GET_CONTENT);
                          i.addCategory(Intent.CATEGORY_OPENABLE);
                          i.setType("*/*");
                          startActivityForResult(Intent.createChooser(i, "Explorador"), 1);
                          return true;
                      }
                  });
                  setContentView(wv);
                  try {
                      String[] assets = getAssets().list("");
                      boolean hasUrl = false;
                      for(String str : assets) { if(str.equals("url.txt")) hasUrl = true; }
                      if (hasUrl) {
                          BufferedReader br = new BufferedReader(new InputStreamReader(getAssets().open("url.txt")));
                          wv.loadUrl(br.readLine());
                      } else { wv.loadUrl("file:///android_asset/index.html"); }
                  } catch (Exception e) { wv.loadUrl("file:///android_asset/index.html"); }
              }
              @Override
              protected void onActivityResult(int req, int res, Intent d) {
                  if (req == 1 && mUploadMessage != null) {
                      mUploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(res, d));
                      mUploadMessage = null;
                  }
              }
          }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application 
                  android:label="@string/app_name" 
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<resources><string name="app_name">${{ github.event.client_payload.app_name }}</string></resources>' > app/src/main/res/values/strings.xml

          if [ "${{ github.event.client_payload.source_type }}" == "url" ]; then
            echo "${{ github.event.client_payload.content }}" > app/src/main/assets/url.txt
          else
            if [ -f "input_assets/app_content.bin" ]; then
              if [ "${{ github.event.client_payload.file_ext }}" == "zip" ]; then
                unzip input_assets/app_content.bin -d app/src/main/assets/
              else
                cp input_assets/app_content.bin app/src/main/assets/index.html
              fi
            fi
          fi

      - name: 3. Java y Gradle
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Compilar
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 5. Generar APK
        run: gradle assembleDebug

      - name: 6. Publicar APK como Release directo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME="${{ github.event.client_payload.app_name }}"
          TAG="build-${{ github.run_id }}"
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          APK_FINAL="${APP_NAME}.apk"
          cp "$APK_PATH" "$APK_FINAL"
          gh release create "$TAG" "$APK_FINAL" \
            --title "$APP_NAME" \
            --notes "APK generado automáticamente por WebForge" \
            --repo ${{ github.repository }}
