name: WebForge Build Engine V5
on:
  repository_dispatch:
    types: [build_app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Limpiar y Descargar
        uses: actions/checkout@v4

      - name: 3. Java y Gradle
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 2. Crear Proyecto Blindado
        run: |
          rm -rf app build.gradle settings.gradle gradle gradlew gradlew.bat

          mkdir -p app/src/main/res/values/
          mkdir -p app/src/main/res/mipmap-xhdpi/
          mkdir -p app/src/main/res/xml/
          mkdir -p app/src/main/java/com/webforge/app/
          mkdir -p app/src/main/assets/
          mkdir -p input_assets/

          # ── settings.gradle ──────────────────────────────────────────────
          cat > settings.gradle << 'ENDOFFILE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WebForgeApp"
          include ':app'
          ENDOFFILE

          # ── build.gradle (raíz) ──────────────────────────────────────────
          cat > build.gradle << 'ENDOFFILE'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          ENDOFFILE

          # ── app/build.gradle ─────────────────────────────────────────────
          PKG_ID="${{ github.event.client_payload.package_id }}"
          if [ -z "$PKG_ID" ]; then PKG_ID="com.webforge.app"; fi

          cat > app/build.gradle << ENDOFFILE
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.webforge.app'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG_ID'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  debug {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.core:core:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          ENDOFFILE

          # ── file_paths.xml ───────────────────────────────────────────────
          cat > app/src/main/res/xml/file_paths.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-files-path name="downloads" path="Downloads/" />
          </paths>
          ENDOFFILE

          # ── Ícono ────────────────────────────────────────────────────────
          if [ -f "input_assets/icon.png" ]; then
            cp input_assets/icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          else
            curl -s -L "https://cdn-icons-png.flaticon.com/512/518/518713.png" \
              -o app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

          # ── MainActivity.java ────────────────────────────────────────────
          cat > app/src/main/java/com/webforge/app/MainActivity.java << 'ENDOFFILE'
          package com.webforge.app;
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.webkit.JavascriptInterface;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import androidx.core.content.FileProvider;
          import java.io.BufferedReader;
          import java.io.File;
          import java.io.InputStreamReader;

          public class MainActivity extends Activity {
              private ValueCallback<Uri[]> mUploadMessage;
              private long downloadId = -1;
              private BroadcastReceiver downloadReceiver;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  WebSettings s = wv.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);

                  wv.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void downloadApk(String url) {
                          runOnUiThread(() -> startApkDownload(url));
                      }
                  }, "AndroidBridge");

                  wv.setWebChromeClient(new WebChromeClient() {
                      public boolean onShowFileChooser(WebView w, ValueCallback<Uri[]> f,
                              WebChromeClient.FileChooserParams p) {
                          mUploadMessage = f;
                          Intent i = new Intent(Intent.ACTION_GET_CONTENT);
                          i.addCategory(Intent.CATEGORY_OPENABLE);
                          i.setType("*/*");
                          startActivityForResult(Intent.createChooser(i, "Explorador"), 1);
                          return true;
                      }
                  });

                  wv.setWebViewClient(new WebViewClient());
                  setContentView(wv);

                  try {
                      String[] assets = getAssets().list("");
                      boolean hasUrl = false;
                      for (String str : assets) {
                          if (str.equals("url.txt")) { hasUrl = true; break; }
                      }
                      if (hasUrl) {
                          BufferedReader br = new BufferedReader(
                              new InputStreamReader(getAssets().open("url.txt")));
                          String url = br.readLine();
                          br.close();
                          if (url != null && !url.trim().isEmpty()) {
                              wv.loadUrl(url.trim());
                          } else {
                              wv.loadUrl("file:///android_asset/index.html");
                          }
                      } else {
                          wv.loadUrl("file:///android_asset/index.html");
                      }
                  } catch (Exception e) {
                      wv.loadUrl("file:///android_asset/index.html");
                  }

                  downloadReceiver = new BroadcastReceiver() {
                      @Override
                      public void onReceive(Context ctx, Intent intent) {
                          long id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                          if (id == downloadId) { installDownloadedApk(); }
                      }
                  };
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      registerReceiver(downloadReceiver,
                          new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE),
                          Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(downloadReceiver,
                          new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE));
                  }
              }

              private void startApkDownload(String url) {
                  try {
                      DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                      DownloadManager.Request req = new DownloadManager.Request(Uri.parse(url));
                      req.setTitle("Descargando APK...");
                      req.setDescription("Por favor espera");
                      req.setNotificationVisibility(
                          DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                      req.setDestinationInExternalFilesDir(
                          this, Environment.DIRECTORY_DOWNLOADS, "app_instalada.apk");
                      req.addRequestHeader("Accept",
                          "application/vnd.android.package-archive");
                      downloadId = dm.enqueue(req);
                  } catch (Exception e) {
                      Intent i = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                      startActivity(i);
                  }
              }

              private void installDownloadedApk() {
                  try {
                      File apk = new File(
                          getExternalFilesDir(Environment.DIRECTORY_DOWNLOADS),
                          "app_instalada.apk");
                      Intent intent = new Intent(Intent.ACTION_VIEW);
                      Uri uri;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          uri = FileProvider.getUriForFile(
                              this, getPackageName() + ".provider", apk);
                          intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      } else {
                          uri = Uri.fromFile(apk);
                      }
                      intent.setDataAndType(uri,
                          "application/vnd.android.package-archive");
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              @Override
              protected void onActivityResult(int req, int res, Intent d) {
                  if (req == 1 && mUploadMessage != null) {
                      mUploadMessage.onReceiveValue(
                          WebChromeClient.FileChooserParams.parseResult(res, d));
                      mUploadMessage = null;
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  if (downloadReceiver != null) unregisterReceiver(downloadReceiver);
              }
          }
          ENDOFFILE

          # ── AndroidManifest.xml ──────────────────────────────────────────
          APP_NAME="${{ github.event.client_payload.app_name }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="WebForge App"; fi

          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <application
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.provider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          ENDOFFILE

          # ── strings.xml ──────────────────────────────────────────────────
          APP_NAME="${{ github.event.client_payload.app_name }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="WebForge App"; fi
          echo "<resources><string name=\"app_name\">${APP_NAME}</string></resources>" \
            > app/src/main/res/values/strings.xml

          # ── Contenido (URL o HTML) ────────────────────────────────────────
          SOURCE_TYPE="${{ github.event.client_payload.source_type }}"
          CONTENT="${{ github.event.client_payload.content }}"
          FILE_EXT="${{ github.event.client_payload.file_ext }}"

          if [ "$SOURCE_TYPE" == "url" ]; then
            echo "$CONTENT" > app/src/main/assets/url.txt
          else
            if [ -f "input_assets/app_content.bin" ]; then
              if [ "$FILE_EXT" == "zip" ]; then
                unzip -o input_assets/app_content.bin -d app/src/main/assets/
              else
                cp input_assets/app_content.bin app/src/main/assets/index.html
              fi
            fi
          fi

          # ── Wrapper de Gradle ─────────────────────────────────────────────
          gradle wrapper --gradle-version=8.7

      - name: 4. Compilar APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 5. Publicar APK como Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME="${{ github.event.client_payload.app_name }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="WebForgeApp"; fi
          TAG="build-${{ github.run_id }}"
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -dc '[:alnum:]_-')
          APK_FINAL="${SAFE_NAME}.apk"
          cp "$APK_PATH" "$APK_FINAL"
          gh release create "$TAG" "$APK_FINAL" \
            --title "$APP_NAME" \
            --notes "APK generada por WebForge" \
            --repo ${{ github.repository }}
