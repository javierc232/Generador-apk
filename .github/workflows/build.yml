Name: WebForge Build Engine V5 - Universal
on:
  repository_dispatch:
    types: [build_app]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Procesar Archivos de Entrada
        run: |
          # Crear carpetas si no existen
          mkdir -p app/src/main/assets/
          
          # Mover datos (ajustado a ruta estándar de Android)
          if [ -f "input_assets/app_data.bin" ]; then
            cp input_assets/app_data.bin app/src/main/assets/index.html
          fi

          # Icono
          if [ -f "input_assets/icon.png" ]; then
            mkdir -p app/src/main/res/mipmap-xhdpi/
            cp input_assets/icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

      - name: 3. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 4. Compilar APK (Ruta Corregida)
        run: |
          # Buscamos gradlew en la raíz primero
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug -x lint
          # Si no, probamos en la carpeta app
          elif [ -f "app/gradlew" ]; then
            cd app
            chmod +x gradlew
            ./gradlew assembleDebug -x lint
          else
            echo "Error: No se encontró gradlew en ninguna ubicación conocida"
            exit 1
          fi

      - name: 5. Crear Release y Subir APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: App ${{ github.event.client_payload.name || 'Nueva Build' }}
          files: |
            **/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
