name: Generador de APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Descomprimir Proyecto
        run: |
          # Instalamos unzip y buscamos cualquier archivo .zip para extraerlo
          sudo apt-get install -y unzip
          find . -name "*.zip" -exec unzip -o {} \; || echo "No se encontró ZIP, continuando..."

      - name: Construir APK (Modo Robusto)
        run: |
          # 1. Buscamos el archivo settings.gradle (que define la raíz del proyecto)
          SETTINGS_PATH=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1)
          
          if [ -z "$SETTINGS_PATH" ]; then
            echo "Error: No se encontró un proyecto Android válido. Revisa que tu ZIP contenga los archivos del código fuente."
            exit 1
          fi
          
          # 2. Nos movemos a la carpeta donde está el proyecto
          PROJECT_ROOT=$(dirname "$SETTINGS_PATH")
          cd "$PROJECT_ROOT"
          echo "Construyendo en: $PROJECT_ROOT"

          # 3. Aseguramos que gradlew exista y tenga permisos, si no lo creamos
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

          # 4. Ejecutamos la compilación
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK Resultante
        uses: actions/upload-artifact@v4
        with:
          name: Mi-Aplicacion-APK
          path: "**/build/outputs/apk/debug/*.apk"
