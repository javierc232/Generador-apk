name: Generador de APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Descomprimir y Preparar Proyecto
        run: |
          # 1. Descomprimir el archivo ZIP
          unzip -o "*.zip"
          
          # 2. Buscar dónde está el archivo gradlew (incluso si está en subcarpetas)
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "No se encontró gradlew en el ZIP, intentando buscar por build.gradle..."
            BUILD_PATH=$(find . -name "build.gradle" | head -n 1)
            PROJECT_DIR=$(dirname "$BUILD_PATH")
          else
            PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          fi
          
          echo "DIRECTORIO_PROYECTO=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Proyecto detectado en: $PROJECT_DIR"

      - name: Build Debug APK
        run: |
          cd ${{ env.DIRECTORIO_PROYECTO }}
          # Si no existe gradlew, lo creamos
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Mi-Aplicacion-Generada
          path: "**/build/outputs/apk/debug/*.apk"
