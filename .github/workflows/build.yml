name: WebForge Build Engine
on:
  repository_dispatch:
    types: [build_app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Crear Proyecto con ICONO y EXPLORADOR
        run: |
          # Borrar carpetas de intentos anteriores para que no haya errores
          rm -rf app build.gradle settings.gradle
          
          # Crear carpetas necesarias (incluyendo la del icono)
          mkdir -p app/src/main/res/values/
          mkdir -p app/src/main/res/mipmap-xhdpi/
          mkdir -p app/src/main/java/com/webforge/app/
          mkdir -p app/src/main/assets/

          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.webforge.app'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_id }}'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

          # --- AQUÍ SE PROCESA EL ICONO ---
          # Si enviaste un icono, lo convertimos de texto a imagen real
          if [ "${{ github.event.client_payload.icon_content }}" != "" ]; then
            echo "${{ github.event.client_payload.icon_content }}" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

          # --- CÓDIGO DE LA APP (MainActivity) ---
          cat <<EOF > app/src/main/java/com/webforge/app/MainActivity.java
          package com.webforge.app;
          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebSettings;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;

          public class MainActivity extends Activity {
              private ValueCallback<Uri[]> mUploadMessage;
              private final static int FILECHOOSER_RESULTCODE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          if (mUploadMessage != null) mUploadMessage.onReceiveValue(null);
                          mUploadMessage = filePathCallback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("*/*");
                          startActivityForResult(Intent.createChooser(intent, "Seleccionar archivo"), FILECHOOSER_RESULTCODE);
                          return true;
                      }
                  });

                  setContentView(webView);
                  try {
                      String[] assets = getAssets().list("");
                      boolean hasUrl = false;
                      for(String s : assets) { if(s.equals("url.txt")) hasUrl = true; }
                      if (hasUrl) {
                          BufferedReader br = new BufferedReader(new InputStreamReader(getAssets().open("url.txt")));
                          webView.loadUrl(br.readLine());
                      } else {
                          webView.loadUrl("file:///android_asset/index.html");
                      }
                  } catch (Exception e) { webView.loadUrl("file:///android_asset/index.html"); }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILECHOOSER_RESULTCODE) {
                      if (null == mUploadMessage) return;
                      Uri[] result = WebChromeClient.FileChooserParams.parseResult(resultCode, data);
                      mUploadMessage.onReceiveValue(result);
                      mUploadMessage = null;
                  }
              }
          }
          EOF

          # --- CONFIGURACIÓN PARA QUE LA APP TENGA ICONO ---
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application 
                  android:label="@string/app_name" 
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar"
                  android:requestLegacyExternalStorage="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          echo '<resources><string name="app_name">${{ github.event.client_payload.app_name }}</string></resources>' > app/src/main/res/values/strings.xml

          if [ "${{ github.event.client_payload.source_type }}" == "url" ]; then
            echo "${{ github.event.client_payload.content }}" > app/src/main/assets/url.txt
          else
            echo "${{ github.event.client_payload.content }}" | base64 -d > app/src/main/assets/index.html
          fi

      - name: 3. Configurar Java y Gradle
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Compilar APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 5. Generar Archivo
        run: gradle assembleDebug

      - name: 6. Subir APK Final
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Final
          path: app/build/outputs/apk/debug/app-debug.apk
