name: Generador de APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Descomprimir y Listar Archivos
        run: |
          # Intentar descomprimir si hay un ZIP
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip
            echo "✅ Proyecto descomprimido"
          fi
          # Esto nos permite ver en los LOGS qué carpetas se crearon
          echo "--- Estructura de archivos encontrada ---"
          ls -R

      - name: Construir APK (Auto-reparando Gradle)
        run: |
          # 1. Buscar la carpeta que contiene el archivo build.gradle
          BUILD_FILE=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1)
          
          if [ -z "$BUILD_FILE" ]; then
            echo "❌ ERROR: No se encontró un proyecto de Android (falta build.gradle)."
            exit 1
          fi
          
          PROJECT_ROOT=$(dirname "$BUILD_FILE")
          cd "$PROJECT_ROOT"
          echo "📍 Entrando al proyecto en: $PROJECT_ROOT"

          # 2. Si no existe 'gradlew', lo generamos usando el gradle instalado en el sistema
          if [ ! -f "gradlew" ]; then
            echo "⚠️ No se encontró gradlew, generando uno nuevo..."
            gradle wrapper
          fi

          # 3. Dar permisos y construir
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
