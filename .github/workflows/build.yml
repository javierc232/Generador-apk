name: WebForge Build Engine V5 - Universal
on:
  repository_dispatch:
    types: [build_app]
  workflow_dispatch: # Permite lanzarlo manual si hace falta

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Procesar Archivos de Entrada
        run: |
          mkdir -p input_assets
          mkdir -p app/app/src/main/assets/
          mkdir -p app/app/src/main/java/com/webforge/app/
          mkdir -p app/app/src/main/cpp/

          # 2.1 Procesar el contenido principal (app_data.bin)
          if [ -f "input_assets/app_data.bin" ]; then
            # Detectar tipo de archivo por extensión real si se guardó con nombre
            # O tratarlo como HTML por defecto
            mv input_assets/app_data.bin app/app/src/main/assets/index.html
          fi

          # 2.2 Si es un ZIP, lo descomprimimos en assets
          if [[ "${{ github.event.client_payload.source }}" == *".zip"* ]]; then
             unzip -o app/app/src/main/assets/index.html -d app/app/src/main/assets/
             rm app/app/src/main/assets/index.html
          fi

          # 2.3 Mover archivos de lógica si existen
          mv *.java app/app/src/main/java/com/webforge/app/ 2>/dev/null || true
          mv *.cpp app/app/src/main/cpp/ 2>/dev/null || true
          
          # 2.4 Configuración del Icono
          if [ -f "input_assets/icon.png" ]; then
            mkdir -p app/app/src/main/res/mipmap-xhdpi/
            cp input_assets/icon.png app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

      - name: 3. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 4. Compilar APK (Modo Universal)
        run: |
          cd app
          chmod +x gradlew
          # Usamos flags para ignorar errores menores de lint y continuar
          ./gradlew assembleDebug -x lint

      - name: 5. Crear Release y Subir APK
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: App ${{ github.event.client_payload.name || 'Nueva Build' }}
          files: app/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
