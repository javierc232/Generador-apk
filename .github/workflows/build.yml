name: WebForge Build Engine
on:
  repository_dispatch:
    types: [build_app] # Esto escucha a tu aplicación HTML

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código Base
        uses: actions/checkout@v3

      - name: 2. Inyectar Datos de la Web
        run: |
          # 1. Cambiar el nombre de la App en strings.xml
          sed -i "s/APP_NAME_PLACEHOLDER/${{ github.event.client_payload.app_name }}/g" app/src/main/res/values/strings.xml
          
          # 2. Cambiar el Package ID en build.gradle
          sed -i "s/PACKAGE_ID_PLACEHOLDER/${{ github.event.client_payload.package_id }}/g" app/build.gradle
          
          # 3. Inyectar Contenido (URL o Archivo)
          mkdir -p app/src/main/assets/
          if [ "${{ github.event.client_payload.source_type }}" == "url" ]; then
            # Si es URL, guardamos la URL en un archivo que leerá Android
            echo "${{ github.event.client_payload.content }}" > app/src/main/assets/url.txt
          else
            # Si es archivo, decodificamos el Base64 que envió la web
            echo "${{ github.event.client_payload.content }}" | base64 -d > user_file.bin
            if [ "${{ github.event.client_payload.file_extension }}" == "zip" ]; then
              unzip user_file.bin -d app/src/main/assets/
            else
              mv user_file.bin app/src/main/assets/index.html
            fi
          fi

      - name: 3. Configurar Java y Android SDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 4. Dar permisos a Gradle
        run: chmod +x gradlew

      - name: 5. Compilar APK (Debug)
        run: ./gradlew assembleDebug

      - name: 6. Subir APK Final como Artefacto
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.client_payload.app_name }}-APK
          path: app/build/outputs/apk/debug/app-debug.apk
