name: Generador de APK Maestro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar archivos
        uses: actions/checkout@v4

      - name: 2. Preparar Java y SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Descomprimir y Organizar
        run: |
          # Extraer el proyecto
          find . -name "*.zip" -exec unzip -o {} \;
          
          # Encontrar la carpeta raíz del proyecto
          ROOT=$(find . -name "build.gradle" -o -name "settings.gradle" | head -n 1 | xargs dirname)
          echo "PROYECTO_ROOT=$ROOT" >> $GITHUB_ENV
          echo "Carpeta detectada: $ROOT"

      - name: 4. Reparación Total de Archivos Faltantes
        run: |
          cd ${{ env.PROYECTO_ROOT }}
          
          # Reparar el Gradle Wrapper (Esto quita el error de 'Main Class not found')
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.4
          
          # Verificar/Crear AndroidManifest.xml si no existe
          MANIFEST_PATH="app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Creando Manifest faltante..."
            mkdir -p app/src/main
            cat <<EOF > $MANIFEST_PATH
            <?xml version="1.0" encoding="utf-8"?>
            <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.miapp.personal">
                <uses-permission android:name="android.permission.INTERNET" />
                <application android:allowBackup="true" android:label="Mi App" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                    <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                        <intent-filter>
                            <action android:name="android.intent.action.MAIN" />
                            <category android:name="android.intent.category.LAUNCHER" />
                        </intent-filter>
                    </activity>
                </application>
            </manifest>
          EOF
          fi

      - name: 5. Compilar APK
        run: |
          cd ${{ env.PROYECTO_ROOT }}
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Descargar APK Lista
        uses: actions/upload-artifact@v4
        with:
          name: Aplicacion-Final-APK
          path: "**/*.apk"
