name: Generador de APK Profesional

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: 4. Descomprimir y Localizar Proyecto
        run: |
          # Instalamos unzip por seguridad
          sudo apt-get install -y unzip
          
          # Descomprimimos todos los archivos ZIP encontrados
          find . -name "*.zip" -exec unzip -o {} \;
          
          # BUSQUEDA INTELIGENTE: Localizamos la carpeta que tiene el archivo build.gradle
          # Esto soluciona el problema de carpetas anidadas dentro del ZIP
          PROJECT_PATH=$(find . -name "build.gradle" -o -name "build.gradle.kts" | head -n 1 | xargs dirname)
          
          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ ERROR: No se encontró ningún archivo build.gradle. El ZIP no es un proyecto Android válido."
            exit 1
          fi
          
          # Guardamos la ruta absoluta para los siguientes pasos
          echo "FINAL_PROJECT_DIR=$(readlink -f $PROJECT_PATH)" >> $GITHUB_ENV
          echo "✅ Proyecto encontrado en: $PROJECT_PATH"

      - name: 5. Reparar y Construir APK
        run: |
          # Entramos a la carpeta real del proyecto
          cd ${{ env.FINAL_PROJECT_DIR }}
          
          echo "🛠️ Reparando Gradle Wrapper dañado..."
          # Usamos el gradle del sistema para generar uno nuevo y limpio
          # Esto elimina el error "Could not find or load main class"
          gradle wrapper
          
          echo "🚀 Iniciando compilación del APK..."
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Entregar APK (Descargar en pestaña Actions)
        uses: actions/upload-artifact@v4
        with:
          name: Mi-Aplicacion-APK
          path: "**/*.apk"
