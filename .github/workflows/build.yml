name: WebForge Build Engine
on:
  repository_dispatch:
    types: [build_app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Crear Proyecto Completo (Auto-Fix)
        run: |
          # Crear carpetas
          mkdir -p app/src/main/res/values/
          mkdir -p app/src/main/java/com/webforge/app/
          mkdir -p app/src/main/assets/

          # 1. Root settings.gradle
          echo "include ':app'" > settings.gradle

          # 2. Root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 3. App build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.webforge.app'
              compileSdk 33
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_id }}'
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'android.webkit:webkit:1.6.1'
          }
          EOF

          # 4. AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="@string/app_name"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Strings.xml (Nombre de la App)
          echo '<resources><string name="app_name">${{ github.event.client_payload.app_name }}</string></resources>' > app/src/main/res/values/strings.xml

          # 6. MainActivity.java (El código real)
          cat <<EOF > app/src/main/java/com/webforge/app/MainActivity.java
          package com.webforge.app;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          import java.io.BufferedReader;
          import java.io.InputStreamReader;
          import java.io.File;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  setContentView(webView);

                  try {
                      String[] assets = getAssets().list("");
                      boolean hasUrl = false;
                      for(String s : assets) { if(s.equals("url.txt")) hasUrl = true; }

                      if (hasUrl) {
                          BufferedReader br = new BufferedReader(new InputStreamReader(getAssets().open("url.txt")));
                          webView.loadUrl(br.readLine());
                      } else {
                          webView.loadUrl("file:///android_asset/index.html");
                      }
                  } catch (Exception e) {
                      webView.loadUrl("file:///android_asset/index.html");
                  }
              }
          }
          EOF

          # 7. Inyectar contenido HTML o URL
          if [ "${{ github.event.client_payload.source_type }}" == "url" ]; then
            echo "${{ github.event.client_payload.content }}" > app/src/main/assets/url.txt
          else
            echo "${{ github.event.client_payload.content }}" | base64 -d > app/src/main/assets/index.html
          fi

      - name: 3. Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Instalar y Compilar con Gradle Estable
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7' # Forzamos la versión estable

      - name: 5. Ejecutar Compilación
        run: gradle assembleDebug

      - name: 6. Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
