name: WebForge Build Engine V6
on:
  repository_dispatch:
    types: [build_app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Limpiar y Descargar
        uses: actions/checkout@v4

      - name: 2. Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Crear Proyecto
        run: |
          rm -rf app build.gradle settings.gradle gradle gradlew gradlew.bat .gradle

          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/java/com/webforge/app
          mkdir -p app/src/main/assets
          mkdir -p input_assets

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WebForgeApp"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          PKG_ID="${{ github.event.client_payload.package_id }}"
          [ -z "$PKG_ID" ] && PKG_ID="com.webforge.app"

          cat > app/build.gradle << EOF
          plugins { id 'com.android.application' }
          android {
              namespace 'com.webforge.app'
              compileSdk 34
              defaultConfig {
                  applicationId "${PKG_ID}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-files-path name="downloads" path="Downloads/" />
          </paths>
          EOF

          if [ -f "input_assets/icon.png" ]; then
            cp input_assets/icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          else
            curl -s -L "https://cdn-icons-png.flaticon.com/512/518/518713.png" \
              -o app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

          cat > app/src/main/java/com/webforge/app/MainActivity.java << 'EOF'
          package com.webforge.app;
          import android.app.Activity;
          import android.app.DownloadManager;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.content.IntentFilter;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.webkit.JavascriptInterface;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.core.content.FileProvider;
          import java.io.BufferedReader;
          import java.io.File;
          import java.io.InputStreamReader;

          public class MainActivity extends Activity {
              private ValueCallback<Uri[]> mUploadMessage;
              private long downloadId = -1;
              private BroadcastReceiver downloadReceiver;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView wv = new WebView(this);
                  WebSettings s = wv.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);

                  wv.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void downloadApk(String url) {
                          runOnUiThread(() -> startApkDownload(url));
                      }
                  }, "AndroidBridge");

                  wv.setWebViewClient(new WebViewClient());
                  wv.setWebChromeClient(new WebChromeClient() {
                      public boolean onShowFileChooser(WebView w, ValueCallback<Uri[]> f,
                              WebChromeClient.FileChooserParams p) {
                          mUploadMessage = f;
                          Intent i = new Intent(Intent.ACTION_GET_CONTENT);
                          i.addCategory(Intent.CATEGORY_OPENABLE);
                          i.setType("*/*");
                          startActivityForResult(Intent.createChooser(i, "Archivo"), 1);
                          return true;
                      }
                  });
                  setContentView(wv);

                  try {
                      boolean hasUrl = false;
                      for (String f : getAssets().list("")) {
                          if (f.equals("url.txt")) { hasUrl = true; break; }
                      }
                      if (hasUrl) {
                          BufferedReader br = new BufferedReader(
                              new InputStreamReader(getAssets().open("url.txt")));
                          String url = br.readLine(); br.close();
                          wv.loadUrl((url != null && !url.trim().isEmpty())
                              ? url.trim() : "file:///android_asset/index.html");
                      } else {
                          wv.loadUrl("file:///android_asset/index.html");
                      }
                  } catch (Exception e) {
                      wv.loadUrl("file:///android_asset/index.html");
                  }

                  downloadReceiver = new BroadcastReceiver() {
                      @Override public void onReceive(Context ctx, Intent intent) {
                          long id = intent.getLongExtra(DownloadManager.EXTRA_DOWNLOAD_ID, -1);
                          if (id == downloadId) installDownloadedApk();
                      }
                  };
                  IntentFilter filter = new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE);
                  if (Build.VERSION.SDK_INT >= 33) {
                      registerReceiver(downloadReceiver, filter, Context.RECEIVER_NOT_EXPORTED);
                  } else {
                      registerReceiver(downloadReceiver, filter);
                  }
              }

              private void startApkDownload(String url) {
                  try {
                      DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                      DownloadManager.Request req = new DownloadManager.Request(Uri.parse(url));
                      req.setTitle("Descargando APK...");
                      req.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                      req.setDestinationInExternalFilesDir(this, Environment.DIRECTORY_DOWNLOADS, "app.apk");
                      downloadId = dm.enqueue(req);
                  } catch (Exception e) {
                      startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                  }
              }

              private void installDownloadedApk() {
                  try {
                      File apk = new File(getExternalFilesDir(Environment.DIRECTORY_DOWNLOADS), "app.apk");
                      Intent intent = new Intent(Intent.ACTION_VIEW);
                      Uri uri = (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N)
                          ? FileProvider.getUriForFile(this, getPackageName() + ".provider", apk)
                          : Uri.fromFile(apk);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N)
                          intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      intent.setDataAndType(uri, "application/vnd.android.package-archive");
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                  } catch (Exception e) { e.printStackTrace(); }
              }

              @Override protected void onActivityResult(int req, int res, Intent d) {
                  if (req == 1 && mUploadMessage != null) {
                      mUploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(res, d));
                      mUploadMessage = null;
                  }
              }

              @Override protected void onDestroy() {
                  super.onDestroy();
                  if (downloadReceiver != null) unregisterReceiver(downloadReceiver);
              }
          }
          EOF

          APP_NAME="${{ github.event.client_payload.app_name }}"
          [ -z "$APP_NAME" ] && APP_NAME="WebForge App"

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>
              <application
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.NoTitleBar"
                  android:requestLegacyExternalStorage="true"
                  android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.provider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"/>
                  </provider>
              </application>
          </manifest>
          EOF

          printf '<resources><string name="app_name">%s</string></resources>' "$APP_NAME" \
            > app/src/main/res/values/strings.xml

          SOURCE="${{ github.event.client_payload.source_type }}"
          CONTENT="${{ github.event.client_payload.content }}"
          EXT="${{ github.event.client_payload.file_ext }}"

          if [ "$SOURCE" = "url" ]; then
            printf '%s' "$CONTENT" > app/src/main/assets/url.txt
          elif [ -f "input_assets/app_content.bin" ]; then
            if [ "$EXT" = "zip" ]; then
              unzip -o input_assets/app_content.bin -d app/src/main/assets/
            else
              cp input_assets/app_content.bin app/src/main/assets/index.html
            fi
          fi

      - name: 4. Gradle Wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: 5. Compilar APK
        run: gradle assembleDebug --no-daemon

      - name: 6. Publicar Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APP_NAME="${{ github.event.client_payload.app_name }}"
          [ -z "$APP_NAME" ] && APP_NAME="WebForgeApp"
          TAG="build-${{ github.run_id }}"
          SAFE=$(echo "$APP_NAME" | tr ' ' '_' | tr -dc '[:alnum:]_-')
          cp app/build/outputs/apk/debug/app-debug.apk "${SAFE}.apk"
          gh release create "$TAG" "${SAFE}.apk" \
            --title "$APP_NAME" \
            --notes "APK generada por WebForge" \
            --repo ${{ github.repository }}
