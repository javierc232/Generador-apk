name: WebForge Build Engine
on:
  repository_dispatch:
    types: [build_app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Inyectar Datos
        run: |
          sed -i "s/APP_NAME_PLACEHOLDER/${{ github.event.client_payload.app_name }}/g" app/src/main/res/values/strings.xml
          sed -i "s/PACKAGE_ID_PLACEHOLDER/${{ github.event.client_payload.package_id }}/g" app/build.gradle
          
          mkdir -p app/src/main/assets/
          
          if [ "${{ github.event.client_payload.source_type }}" == "url" ]; then
            echo "${{ github.event.client_payload.content }}" > app/src/main/assets/url.txt
          else
            echo "${{ github.event.client_payload.content }}" | base64 -d > app/src/main/assets/index.html
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Actualizado a v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3 # Nueva versión recomendada

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # ¡ESTE ERA EL ERROR! Actualizado a v4
        with:
          name: ${{ github.event.client_payload.app_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
