name: Generador de APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Se eliminó la línea de cache para evitar el error de archivos no encontrados

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Descomprimir proyecto
        run: |
          # Instalamos unzip por si no está presente
          sudo apt-get install -y unzip
          # Descomprimimos cualquier archivo zip que esté en la raíz
          if ls *.zip 1> /dev/null 2>&1; then
            unzip -o *.zip
            echo "Proyecto descomprimido con éxito"
          else
            echo "No se encontró archivo ZIP, continuando con los archivos actuales..."
          fi

      - name: Preparar Gradlew y Construir APK
        run: |
          # Buscamos el archivo gradlew en todas las carpetas
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERROR: No se encontró el archivo gradlew. Asegúrate de que el proyecto Android sea válido."
            exit 1
          fi
          
          # Entramos a la carpeta donde está el proyecto
          PROJECT_ROOT=$(dirname "$GRADLEW_PATH")
          cd "$PROJECT_ROOT"
          
          # Damos permisos y ejecutamos la construcción
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
