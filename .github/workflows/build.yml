name: WebForge Build Engine V6 - Universal

on:
  repository_dispatch:
    types: [build_app]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Instalar Android SDK
        uses: android-actions/setup-android@v3

      - name: 4. Leer configuración del payload
        id: config
        run: |
          NAME="${{ github.event.client_payload.name }}"
          PACKAGE="${{ github.event.client_payload.package }}"
          TYPE="${{ github.event.client_payload.type }}"
          if [ -z "$NAME" ]; then NAME="WebForgeApp"; fi
          if [ -z "$PACKAGE" ]; then PACKAGE="com.webforge.app"; fi
          if [ -z "$TYPE" ]; then TYPE="html"; fi
          SAFE_NAME=$(echo "$NAME" | tr -dc '[:alnum:]' | sed 's/^[0-9]*//')
          if [ -z "$SAFE_NAME" ]; then SAFE_NAME="MyApp"; fi
          echo "app_name=$NAME" >> $GITHUB_OUTPUT
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: 5. Leer y decodificar archivos de entrada
        run: |
          if [ ! -f "input_assets/app_data.bin" ]; then
            echo "ERROR: No se encontró input_assets/app_data.bin"
            exit 1
          fi
          base64 -d input_assets/app_data.bin > /tmp/app_data 2>/dev/null || cp input_assets/app_data.bin /tmp/app_data

          TYPE="${{ steps.config.outputs.type }}"

          if [ "$TYPE" = "java" ]; then
            cp /tmp/app_data /tmp/MainActivity.java
            echo "Archivo Java listo: $(wc -c < /tmp/MainActivity.java) bytes"
          else
            cp /tmp/app_data /tmp/index.html
            echo "Archivo HTML listo: $(wc -c < /tmp/index.html) bytes"
          fi

      - name: 6. Crear estructura del proyecto Android
        run: |
          PKG="${{ steps.config.outputs.package }}"
          PKG_PATH=$(echo "$PKG" | tr '.' '/')
          SAFE="${{ steps.config.outputs.safe_name }}"
          APP_NAME="${{ steps.config.outputs.app_name }}"
          TYPE="${{ steps.config.outputs.type }}"

          mkdir -p project/app/src/main/java/$PKG_PATH
          mkdir -p project/app/src/main/res/layout
          mkdir -p project/app/src/main/res/values
          mkdir -p project/app/src/main/res/mipmap-hdpi
          mkdir -p project/app/src/main/res/mipmap-mdpi
          mkdir -p project/app/src/main/res/mipmap-xhdpi
          mkdir -p project/app/src/main/res/mipmap-xxhdpi
          mkdir -p project/app/src/main/assets

          if [ -f "input_assets/icon.png" ]; then
            for dpi in hdpi mdpi xhdpi xxhdpi; do
              cp input_assets/icon.png project/app/src/main/res/mipmap-$dpi/ic_launcher.png
            done
          fi

          if [ ! -f "project/app/src/main/res/mipmap-hdpi/ic_launcher.png" ]; then
            for dpi in hdpi mdpi xhdpi xxhdpi; do
              curl -sL "https://via.placeholder.com/192x192.png" \
                -o project/app/src/main/res/mipmap-$dpi/ic_launcher.png
            done
          fi

          if [ "$TYPE" = "java" ]; then
            cp /tmp/MainActivity.java project/app/src/main/java/$PKG_PATH/MainActivity.java
            sed -i "s/^package .*/package $PKG;/" project/app/src/main/java/$PKG_PATH/MainActivity.java

            # Detectar activities EXCEPTO MainActivity — ella siempre es LAUNCHER
            OTHER_ACTS=$(grep -oP 'class\s+\K\w+(?=\s+extends\s+(AppCompatActivity|Activity))' \
              project/app/src/main/java/$PKG_PATH/MainActivity.java \
              | grep -v "^MainActivity$" || true)
            echo "Activities secundarias: $OTHER_ACTS"

            # Construir entradas secundarias
            SECONDARY=""
            for ACT in $OTHER_ACTS; do
              SECONDARY="$SECONDARY
                  <activity
                      android:name=\".$ACT\"
                      android:exported=\"false\"
                      android:configChanges=\"orientation|screenSize|uiMode\"/>"
            done

            # AndroidManifest — MainActivity siempre LAUNCHER, resto secundarias
            cat > project/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="$APP_NAME"
                  android:theme="@style/Theme.App"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|uiMode">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  $SECONDARY
              </application>
          </manifest>
          EOF

          else
            cp /tmp/index.html project/app/src/main/assets/index.html
            cat > project/app/src/main/java/$PKG_PATH/$SAFE.java << EOF
          package $PKG;
          import android.app.Activity;
          import android.os.Bundle;
          import android.content.Intent;
          import android.net.Uri;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          public class $SAFE extends Activity {
              private ValueCallback<Uri[]> filePathCallback;
              private static final int FILE_CHOOSER_REQUEST = 1;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  setContentView(webView);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccessFromFileURLs(true);
                  settings.setAllowUniversalAccessFromFileURLs(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView view, ValueCallback<Uri[]> callback, WebChromeClient.FileChooserParams params) {
                          filePathCallback = callback;
                          Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
                          intent.addCategory(Intent.CATEGORY_OPENABLE);
                          intent.setType("*/*");
                          startActivityForResult(Intent.createChooser(intent, "Seleccionar archivo"), FILE_CHOOSER_REQUEST);
                          return true;
                      }
                  });
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILE_CHOOSER_REQUEST && filePathCallback != null) {
                      Uri[] results = null;
                      if (resultCode == RESULT_OK && data != null) {
                          results = new Uri[]{ data.getData() };
                      }
                      filePathCallback.onReceiveValue(results);
                      filePathCallback = null;
                  }
              }
          }
          EOF

            # AndroidManifest para HTML
            cat > project/app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VISUAL_USER_SELECTED"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="$APP_NAME"
                  android:theme="@style/Theme.App"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true">
                  <activity
                      android:name=".$SAFE"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|uiMode">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
            echo "MainActivity HTML generado."
          fi

          # settings.gradle
          cat > project/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WebForgeApp"
          include ':app'
          EOF

          # build.gradle raíz
          cat > project/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          # build.gradle app
          cat > project/app/build.gradle << EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG'
                  minSdk 21
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.${{ github.run_number }}"
              }
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # gradle.properties
          cat > project/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # layout
          cat > project/app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"/>
          EOF

          # Tema
          cat > project/app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.AppCompat.Light.NoActionBar"/>
          </resources>
          EOF

          echo "Manifest generado:"
          cat project/app/src/main/AndroidManifest.xml
          echo "Estructura creada correctamente."

      - name: 7. Compilar APK con Gradle
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.9-bin.zip" -o /tmp/gradle-8.9.zip
          unzip -q /tmp/gradle-8.9.zip -d /tmp/gradle-dist
          export GRADLE_HOME="/tmp/gradle-dist/gradle-8.9"
          export PATH="$GRADLE_HOME/bin:$PATH"

          echo "Versión de Gradle:"
          gradle --version

          cd project
          gradle assembleDebug --no-daemon --warning-mode=none --stacktrace 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 8. Verificar APK generada
        run: |
          echo "Buscando APK..."
          find project -name "*.apk" 2>/dev/null
          APK=$(find project -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No se generó ninguna APK"
            exit 1
          fi
          echo "APK encontrada: $APK ($(du -h $APK | cut -f1))"
          cp "$APK" app-release.apk

      - name: 9. Crear Release y publicar APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "${{ steps.config.outputs.app_name }} — Build #${{ github.run_number }}"
          body: |
            ✅ APK generada automáticamente por WebForge Build Engine V6
            📦 App: ${{ steps.config.outputs.app_name }}
            📋 Package: ${{ steps.config.outputs.package }}
            📄 Tipo: ${{ steps.config.outputs.type }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
