name: WebForge Build Engine V5 - Universal
on:
  repository_dispatch:
    types: [build_app]
  push:
    branches: [ main ] # También se activará si subes algo manual

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Repositorio
        uses: actions/checkout@v4

      - name: 2. Organizar y Sincronizar
        run: |
          # Aseguramos que existan las carpetas de entrada
          mkdir -p input_assets
          
          # Si subiste archivos sueltos a la raíz, el robot los guarda en su sitio
          mv *.java app/app/src/main/java/com/webforge/app/ 2>/dev/null || true
          mv *.cpp app/app/src/main/cpp/ 2>/dev/null || true
          
          # Copiamos el HTML/JS a la carpeta de recursos de Android
          mkdir -p app/app/src/main/assets/
          cp -r input_assets/* app/app/src/main/assets/ 2>/dev/null || true
          
          # Configuración del Icono
          if [ -f "input_assets/icon.png" ]; then
            cp input_assets/icon.png app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

      - name: 3. Configurar Java 17 y NDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Compilar APK (Java + C++ + HTML)
        run: |
          cd app # Entramos a tu carpeta 'app' real
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 5. Subir Resultado
        uses: actions/upload-artifact@v4
        with:
          name: App-${{ github.event.client_payload.package_id || 'Universal' }}
          path: app/app/build/outputs/apk/debug/app-debug.apk
